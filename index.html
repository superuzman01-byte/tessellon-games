<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystalloop</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #9ca3af;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin: 20px 0;
            transition: transform 0.2s;
        }
        .cta-button:hover {
            transform: scale(1.05);
        }
        footer {
            margin-top: 40px;
            font-size: 0.9rem;
        }
        footer a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 10px;
        }
        footer a:hover {
            text-decoration: underline;
        }
        .support-box {
            background-color: #111827;
            border: 1px solid #1f2937;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Crystalloop</h1>
        <p>Get ready for a brilliant, strategic match-3 puzzle experience.</p>
        
        <!-- Updated to Contact Us Button -->
        <a href="mailto:tessellongames@gmail.com" class="cta-button">Contact Us</a>

        <div class="support-box">
            <h3>Support & Contact</h3>
            <p>Have questions, feedback, or need technical assistance? Reach out to us directly at:</p>
            <p><strong><a href="mailto:tessellongames@gmail.com" style="color: #3b82f6; text-decoration: none;">tessellongames@gmail.com</a></strong></p>
        </div>

        <footer>
            <p>&copy; 2026 Tessellon Games. All rights reserved.</p>
            <a href="./privacy.html">Privacy Policy</a>
        </footer>
    </div>

</body>
</html>
